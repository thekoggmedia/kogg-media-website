backend:
  name: github
  repo: thekoggmedia/kogg-media-website
  branch: main
  base_url: https://sveltia-cms-auth.pages.dev

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: updates
    label: Updates & Blog Posts
    folder: src/content/updates
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Category, name: category, widget: select, options: [Brand Philosophy, Design Thinking, AI & Technology, Education, Live Events, Case Studies, News] }
      - { label: Date, name: date, widget: datetime }
      - { label: Read Time, name: readTime, widget: string, default: "5 min read" }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: portfolio
    label: Portfolio Projects
    folder: src/content/portfolio
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Category, name: category, widget: select, options: [Branding, Motion, Web, Video, Social, Events, Photography, AI] }
      - { label: Description, name: desc, widget: text }
      - { label: Behance Link, name: behanceLink, widget: string, required: false }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: settings
    label: Site Settings
    files:
      - label: YouTube Videos
        name: youtube
        file: src/content/settings/youtube.json
        fields:
          - label: Videos
            name: videos
            widget: list
            fields:
              - { label: Video ID, name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Category, name: category, widget: string }
              - { label: Featured, name: featured, widget: boolean, default: false }